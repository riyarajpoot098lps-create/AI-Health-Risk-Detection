<!DOCTYPE html>
<html>
<head>
    <title>Health Predictor</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>

<div class="form-container">

    <div class="form-box">

        <h1>🩺 Smart Health Check</h1>
        <p class="subtitle">Enter your details for instant health analysis</p>
        <p class="tip">💡 Regular checkups help prevent diseases early</p>

        <form action="/predict" method="POST">

            <div class="form-group">
                <label>Age</label>
                <input type="number" name="age" required>
            </div>

            <div class="form-group">
                <label>Weight (kg)</label>
                <input type="number" name="weight" id="weight" required>
            </div>

            <div class="form-group">
                <label>Height (cm)</label>
                <input type="number" name="height" id="height" required>
            </div>

            <div class="form-group">
                <label>Blood Pressure</label>
                <input type="number" name="bp" required>
            </div>

            <div class="form-group">
                <label>Do you smoke?</label>
                <select name="smoking">
                    <option>No</option>
                    <option>Yes</option>
                </select>
            </div>

            <p id="bmiText">BMI: --</p>

            <button type="submit">🚀 Analyze Health</button>

        </form>

    </div>

</div>

<script>
const weight = document.getElementById("weight");
const height = document.getElementById("height");
const bmiText = document.getElementById("bmiText");

function calculateBMI() {
    let w = weight.value;
    let h = height.value;

    if(w && h){
        let bmi = (w / ((h/100)**2)).toFixed(2);
        bmiText.innerText = "BMI: " + bmi;
    }
}

weight.addEventListener("input", calculateBMI);
height.addEventListener("input", calculateBMI);
</script>

</body>
</html>
